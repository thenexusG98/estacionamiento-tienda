name: Publicar release de estacionamiento

on:
  workflow_dispatch:
  push:
    branches:
      - main
      - feature/implementacion-actualizaciones-automaticas

jobs:
  release:
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: 'ubuntu-22.04' # Linux
            args: ''
          - platform: 'windows-latest' # Windows
            args: ''

    runs-on: ${{ matrix.platform }}

    steps:
      - name: Clona el repositorio
        uses: actions/checkout@v4
        with:
          fetch-depth: 0   # Necesario para poder crear y subir tags

      # 1. Obtén el último tag y calcula el siguiente
      - name: Calcula el siguiente tag semver
        id: semver
        run: |
          # Determina el prefijo del tag según la rama
          BRANCH_NAME="${GITHUB_REF#refs/heads/}"
          if [[ "$BRANCH_NAME" == "feature/implementacion-actualizaciones-automaticas" ]]; then
            TAG_PREFIX="test-"
            echo "Es rama de pruebas, usando prefijo: $TAG_PREFIX"
          else
            TAG_PREFIX=""
            echo "Es rama main, sin prefijo"
          fi

          # Obtén el último tag con el prefijo correspondiente
          if [[ -n "$TAG_PREFIX" ]]; then
            LAST_TAG=$(git tag --list "${TAG_PREFIX}v*" --sort=-v:refname | head -n 1)
          else
            LAST_TAG=$(git tag --list "v*" --sort=-v:refname | grep -v "^test-" | head -n 1)
          fi
          
          if [[ -z "$LAST_TAG" ]]; then
            LAST_TAG="${TAG_PREFIX}v0.1.0"
          fi

          # Quita el prefijo y la 'v'
          LAST_VERSION=${LAST_TAG#${TAG_PREFIX}v}

          # Separa en partes
          IFS='.' read -r MAJOR MINOR PATCH <<< "$LAST_VERSION"

          # Aumenta el patch
          PATCH=$((PATCH + 1))
          NEW_VERSION="$MAJOR.$MINOR.$PATCH"
          NEW_TAG="${TAG_PREFIX}v$NEW_VERSION"

          echo "LAST_TAG=$LAST_TAG" >> $GITHUB_ENV
          echo "NEW_VERSION=$NEW_VERSION" >> $GITHUB_ENV
          echo "NEW_TAG=$NEW_TAG" >> $GITHUB_ENV
          echo "TAG_PREFIX=$TAG_PREFIX" >> $GITHUB_ENV
          echo "new_tag=$NEW_TAG" >> $GITHUB_OUTPUT
          
          echo "📌 Último tag: $LAST_TAG"
          echo "📌 Nuevo tag: $NEW_TAG"
          echo "📌 Nueva versión: $NEW_VERSION"
        shell: bash

      # 2. Actualiza package.json a la nueva versión (opcional pero recomendado)
      - name: Actualiza package.json a la nueva versión
        run: |
          jq --arg v "$NEW_VERSION" '.version = $v' package.json > tmp.$$.json && mv tmp.$$.json package.json
          cat package.json
        shell: bash

      # 2.1 Sincroniza la versión en todos los archivos
      - name: Sincroniza versión en tauri.conf.json y Cargo.toml
        run: |
          node scripts/sync-version.js
        shell: bash

      # 2.2 Actualiza README.md con changelog
      - name: Actualiza README.md con changelog
        run: |
          node scripts/update-readme.js
        shell: bash

      # 3. Configura git para push autenticado
      - name: Configura git para push autenticado
        run: |
          git config user.name "thenexusG98"
          git config user.email "capitanuri@gmail.com"
          git remote set-url origin https://x-access-token:${{ secrets.GITHUB_TOKEN }}@github.com/${{ github.repository }}
        shell: bash

      # Resto de pasos de build y release...
      - name: Instala dependencias de sistema para Tauri (Linux)
        if: matrix.platform == 'ubuntu-22.04'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev \
            libjavascriptcoregtk-4.1-dev \
            libsoup-3.0-dev \
            build-essential \
            curl \
            wget \
            libssl-dev \
            libgtk-3-dev \
            squashfs-tools \
            pkg-config

      - name: Instala Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Instala Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      # Configurar npm para usar el registry público
      - name: Configura npm registry público
        run: |
          npm config delete registry
          npm config set registry https://registry.npmjs.org/
          npm config list
          # Eliminar package-lock.json para regenerarlo con el registry público
          rm -f package-lock.json
        shell: bash

      # Instalar jq para todas las plataformas
      - name: Instala jq (Linux)
        if: matrix.platform == 'ubuntu-22.04'
        run: sudo apt-get install -y jq
        
      - name: Instala jq (Windows)
        if: matrix.platform == 'windows-latest'
        run: choco install jq -y
        shell: pwsh

      - name: Limpieza profunda de Rust
        run: |
          cd src-tauri
          rm -rf target
          rm -f Cargo.lock
          cargo clean
        shell: bash

      - name: Instala dependencias de Node.js
        run: npm install
        shell: bash

      - name: Actualiza dependencias de Cargo
        run: |
          cd src-tauri
          cargo update
        shell: bash

      - name: Instala Tauri CLI
        run: npm install -g @tauri-apps/cli
        shell: bash

      - name: Compila el proyecto con Tauri
        run: npm run tauri build -- ${{ matrix.args }}
        shell: bash
        env:
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}

      - name: Verifica archivos
        run: |
          echo "=== Archivos generados ==="
          ls -lhR src-tauri/target/release/bundle/ || true
        shell: bash

      # Genera latest.json para el updater (solo en Linux)
      - name: Genera latest.json para actualizaciones
        if: matrix.platform == 'ubuntu-22.04' || matrix.platform == 'windows-latest'
        continue-on-error: true
        run: |
          node scripts/generate-latest-json.js || echo "⚠️ Error generando latest.json, continuando..."
        shell: bash

      # 4. Crea y sube el nuevo tag SOLO DESPUÉS de compilación exitosa (SOLO EN LINUX O WINDOWS)
      - name: Crea y sube el nuevo tag después de compilación exitosa
        if: matrix.platform == 'ubuntu-22.04' || matrix.platform == 'windows-latest'
        run: |
          BRANCH_NAME="${GITHUB_REF#refs/heads/}"
          
          if git rev-parse "$NEW_TAG" >/dev/null 2>&1; then
            echo "El tag $NEW_TAG ya existe, no se crea uno nuevo."
          else
            git add package.json src-tauri/tauri.conf.json src-tauri/Cargo.toml README.md src-tauri/gen/latest.json 2>/dev/null || true
            git commit -m "chore: bump version to $NEW_VERSION [skip ci]" || echo "Nada que commitear"
            git tag "$NEW_TAG" || echo "Tag ya existe"
            git push origin "$NEW_TAG" || echo "Tag ya existe en remoto"
            git push origin "$BRANCH_NAME" || echo "Ya está actualizado"
            echo "✅ Tag $NEW_TAG creado y subido después de compilación exitosa."
          fi
        shell: bash

      - name: Sube archivos a GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ env.NEW_TAG }}
          name: ${{ env.TAG_PREFIX && 'TEST Release' || 'Release' }} ${{ env.NEW_VERSION }}
          body: |
            ${{ env.TAG_PREFIX && '⚠️ **RELEASE DE PRUEBAS** - Para testing de actualizaciones automáticas' || '✅ Release oficial' }}
            
            Versión: ${{ env.NEW_VERSION }}
            Tag: ${{ env.NEW_TAG }}
            Rama: ${{ github.ref_name }}
          draft: false
          prerelease: ${{ env.TAG_PREFIX != '' }}
          files: |
            src-tauri/target/release/bundle/deb/*.deb
            src-tauri/target/release/bundle/appimage/*.AppImage
            src-tauri/target/release/bundle/appimage/*.AppImage.tar.gz
            src-tauri/target/release/bundle/appimage/*.AppImage.tar.gz.sig
            src-tauri/target/release/bundle/appimage/*.sig
            src-tauri/target/release/bundle/msi/*.msi
            src-tauri/target/release/bundle/msi/*.msi.zip
            src-tauri/target/release/bundle/msi/*.msi.zip.sig
            src-tauri/target/release/bundle/msi/*.sig
            src-tauri/target/release/bundle/nsis/*.exe
            src-tauri/target/release/bundle/nsis/*.nsis.zip
            src-tauri/target/release/bundle/nsis/*.nsis.zip.sig
            src-tauri/target/release/bundle/nsis/*.sig
            src-tauri/gen/latest.json
          fail_on_unmatched_files: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}